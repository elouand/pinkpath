services:
  db:
    image: postgis/postgis:15-3.3 # Image incluant Postgres + l'extension spatiale
    container_name: traveling_db_container
    ports:
      - "5432:5432" # Port par défaut de Postgres
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=traveling_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: # Pour que tes données ne s'effacent pas au redémarrage
